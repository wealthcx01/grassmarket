name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# The gate the kickoff mandates: ruff + pyright + pytest must pass. Runs fully offline — no live
# calls (CLAUDE.md quality standard). No --no-verify equivalent: this is the same gate as the
# pre-commit hooks, enforced server-side.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff · pyright · pytest)
    runs-on: ubuntu-latest
    env:
      # Tests construct Settings explicitly; this is only so any incidental Settings() succeeds.
      GM_JWT_SECRET: ci-secret-that-is-more-than-thirty-two-characters-long
      GM_ENV: ci
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # Distinct cache key per job: the backend and E2E jobs run concurrently and both save the
          # uv cache — a shared key races on save, failing the loser's post-step (exit 2). A suffix
          # gives each job its own key, so the saves never collide.
          cache-suffix: backend

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Schemas mirror the models (parity)
        run: |
          uv run python scripts/generate_schemas.py
          git diff --exit-code -- packages/bcap_contracts/src/bcap_contracts/json_schema \
            || (echo "JSON Schemas are out of date — run scripts/generate_schemas.py" && exit 1)

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -q

  frontend:
    name: Frontend (type-check · lint · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    env:
      # A real browser drives the seeded app end-to-end (GRS-0019): generate → review AI sections →
      # approve → download. NEXT_PUBLIC_* is inlined at build time, so it must be set before build.
      GM_JWT_SECRET: ci-secret-that-is-more-than-thirty-two-characters-long
      GM_DATABASE_URL: sqlite+pysqlite:///./local.db
      GM_ENV: ci
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-suffix: e2e  # own cache key so it doesn't race the backend job's save (see backend)
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync backend dependencies
        run: uv sync --all-extras

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Install Playwright browser (+ system deps)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Seed the local database
        run: uv run python scripts/seed_dev.py

      - name: Start the backend (seeded) and wait for health
        run: |
          uv run uvicorn grassmarket.web.main:app --port 8000 --log-level warning &
          for i in $(seq 1 40); do curl -sf http://localhost:8000/health && break; sleep 1; done

      - name: Build and start the frontend, wait for it
        working-directory: frontend
        run: |
          npm run build
          npm start &
          for i in $(seq 1 40); do curl -sf http://localhost:3000/login >/dev/null && break; sleep 1; done

      - name: Run Playwright E2E
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          if-no-files-found: ignore
