# Playwright UI gate + screenshot gallery.
#
# The E2E suite in ci.yml is the functional gate; THIS workflow is the *visual* gate: it runs the
# same Playwright suite AND captures a full-page screenshot gallery of the key screens (desktop +
# mobile) as the `ui-gallery` artifact, so every PR's UI can be eyeballed before merge. The
# frontend shipped through many tickets with no visual verification; this closes that gap.
#
# Runs on ubuntu-24.04 — a Playwright-SUPPORTED platform. CI must never depend on a dev box's quirks
# (this repo's VPS runs Ubuntu 26.04, which Playwright's installer doesn't recognise). The app is
# driven entirely against offline SQLite fixtures seeded by scripts/seed_dev.py (CLAUDE.md: no live
# external calls in CI).

name: E2E UI gate

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write # for the (best-effort) gallery summary comment

concurrency:
  group: e2e-ui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-gate:
    name: Playwright UI gate + gallery
    runs-on: ubuntu-24.04
    timeout-minutes: 10 # keep it fast; fail rather than hang
    env:
      GM_JWT_SECRET: ci-secret-that-is-more-than-thirty-two-characters-long
      GM_DATABASE_URL: sqlite+pysqlite:///./local.db
      GM_ENV: ci
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      E2E_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false # its cache post-step hangs on cold runners (see ci.yml e2e job)
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync backend dependencies
        run: uv sync --all-extras

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Install Playwright browser (+ system deps)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Seed the local database (offline fixtures)
        run: uv run python scripts/seed_dev.py

      - name: Start the backend (seeded) and wait for health
        run: |
          uv run uvicorn grassmarket.web.main:app --port 8000 --log-level warning &
          for i in $(seq 1 40); do curl -sf http://localhost:8000/health && break; sleep 1; done

      - name: Build and start the frontend, wait for it
        working-directory: frontend
        run: |
          npm run build
          npm start &
          for i in $(seq 1 40); do curl -sf http://localhost:3000/login >/dev/null && break; sleep 1; done

      - name: Run Playwright E2E (the functional gate)
        working-directory: frontend
        run: npm run e2e

      - name: Capture the UI gallery (desktop + mobile)
        if: always() # a screenshot gallery is worth having even when a functional test failed
        working-directory: frontend
        run: node scripts/ui-gallery.mjs

      - name: Upload the ui-gallery artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-gallery
          path: frontend/ui-gallery/
          if-no-files-found: warn

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/

      - name: Comment the gallery summary on the PR (best effort)
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true # never fail the gate on a comment permission hiccup (e.g. forks)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let shots = [];
            try { shots = fs.readdirSync('frontend/ui-gallery').filter(f => f.endsWith('.png')).sort(); } catch {}
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '### 🖼️ UI gallery',
              shots.length ? `${shots.length} screenshots captured (desktop + mobile):` : '_No screenshots captured._',
              shots.length ? shots.map(s => `- \`${s}\``).join('\n') : '',
              '',
              `Download the **ui-gallery** artifact from [this run](${runUrl}) to review the screens.`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
