# Customer-Proposition (C) registry section — 10 Phase-E modules + the 93-widget × 15-category
# Level-1 evidence layer (ADR-0023 / GRS-0080). C is a PARALLEL dimension to B/P/L: the engine's
# L path never iterates it, so the golden master is untouched (C rides alongside V in Stage 1).
#
# STATUS: draft-pending-ratification. The module/subcomponent structure is the Phase-E set; the
# widget taxonomy is authored from standard retail-brokerage-app-review structure and MUST be
# reconciled against the founder's WidgetChecklist_COMPLETED (OneDrive, reference-only, never
# committed). Every widget carries a rarity (Common/Uncommon/Rare) and applies to the RETAIL
# profile only. Keys are globally unique across the B/P/L keyspace (fail loud on collision).
status: draft-pending-ratification
profile: retail

c_modules:
  - key: CUST_ONBOARDING
    name: Onboarding
    description: Ease, speed, and clarity of account opening and the KYC burden.
    subcomponents:
      - key: CUST_ONBOARDING_SPEED_TIME_TO_TRADE
        name: Speed / time-to-first-trade
      - key: CUST_ONBOARDING_KYC_FRICTION
        name: KYC & verification friction
      - key: CUST_ONBOARDING_FUNDING_EASE
        name: Funding & first-deposit ease
      - key: CUST_ONBOARDING_GUIDANCE_CLARITY
        name: Guidance & clarity
  - key: CUST_UI_NAVIGATION
    name: UI & Navigation
    description: Layout logic, visual design, accessibility, and customisation.
    subcomponents:
      - key: CUST_UI_NAVIGATION_LAYOUT_LOGIC
        name: Layout logic & IA
      - key: CUST_UI_NAVIGATION_VISUAL_DESIGN
        name: Visual design & polish
      - key: CUST_UI_NAVIGATION_CUSTOMISATION
        name: Customisation & layouts
      - key: CUST_UI_NAVIGATION_PORTFOLIO_VIEW
        name: Portfolio & positions view
  - key: CUST_TRADING_EXPERIENCE
    name: Trading Experience
    description: Order types, execution flow, fee transparency, real-time feedback.
    subcomponents:
      - key: CUST_TRADING_EXPERIENCE_ORDER_TYPES
        name: Order-type coverage
      - key: CUST_TRADING_EXPERIENCE_EXECUTION_FLOW
        name: Execution flow & feedback
      - key: CUST_TRADING_EXPERIENCE_FEE_TRANSPARENCY_AT_TRADE
        name: Fee transparency at trade
      - key: CUST_TRADING_EXPERIENCE_REALTIME_FEEDBACK
        name: Real-time confirmation
  - key: CUST_PRODUCT_RANGE
    name: Product Range
    description: Asset classes, fractional, global vs local access, and wrappers.
    subcomponents:
      - key: CUST_PRODUCT_RANGE_ASSET_CLASSES
        name: Asset-class breadth
      - key: CUST_PRODUCT_RANGE_FRACTIONAL
        name: Fractional & small-lot
      - key: CUST_PRODUCT_RANGE_GLOBAL_ACCESS
        name: Global vs local access
      - key: CUST_PRODUCT_RANGE_WRAPPERS
        name: Tax wrappers (ISA/SIPP/…)
  - key: CUST_RESEARCH_EDUCATION
    name: Research & Education
    description: Market-data depth, educational quality, interactive tools.
    subcomponents:
      - key: CUST_RESEARCH_EDUCATION_MARKET_DATA_DEPTH
        name: Market-data depth
      - key: CUST_RESEARCH_EDUCATION_SCREENERS_TOOLS
        name: Screeners & interactive tools
      - key: CUST_RESEARCH_EDUCATION_EDUCATION_QUALITY
        name: Education quality
      - key: CUST_RESEARCH_EDUCATION_NEWS_CONTENT
        name: News & content
  - key: CUST_AI_PERSONALISATION
    name: AI & Personalisation
    description: AI recommendations, chatbots, personalised content.
    subcomponents:
      - key: CUST_AI_PERSONALISATION_RECOMMENDATIONS
        name: AI recommendations
      - key: CUST_AI_PERSONALISATION_CHATBOTS
        name: Conversational / chatbot
      - key: CUST_AI_PERSONALISATION_PERSONALISED_CONTENT
        name: Personalised content
      - key: CUST_AI_PERSONALISATION_SMART_ALERTS
        name: Smart alerts
  - key: CUST_SECURITY_REGULATION
    name: Security & Regulation
    description: Investor protection, authentication, compliance.
    subcomponents:
      - key: CUST_SECURITY_REGULATION_INVESTOR_PROTECTION
        name: Investor protection (FSCS/SIPC)
      - key: CUST_SECURITY_REGULATION_AUTHENTICATION
        name: Authentication & 2FA
      - key: CUST_SECURITY_REGULATION_COMPLIANCE_DISCLOSURE
        name: Compliance & disclosure
      - key: CUST_SECURITY_REGULATION_ACCOUNT_PROTECTION
        name: Account protection
  - key: CUST_SUPPORT_COMMUNITY
    name: Support & Community
    description: Support availability/quality and social features.
    subcomponents:
      - key: CUST_SUPPORT_COMMUNITY_SUPPORT_AVAILABILITY
        name: Support availability
      - key: CUST_SUPPORT_COMMUNITY_SUPPORT_QUALITY
        name: Support quality
      - key: CUST_SUPPORT_COMMUNITY_SELF_SERVICE_HELP
        name: Self-service help
  - key: CUST_FEES_PRICING
    name: Fees & Pricing
    description: Commissions, spreads, FX fees, subscriptions, inactivity fees.
    subcomponents:
      - key: CUST_FEES_PRICING_COMMISSIONS_SPREADS
        name: Commissions & spreads
      - key: CUST_FEES_PRICING_FX_FEES
