# Commission Schedule v7 (ADR-0026) — rates are CONFIGURATION, never code. Two-stream model.
#
# Rates are in BASIS POINTS (100 bps = 1%). Every product must carry {yr1, yr2, window} and every
# Stream-B delivery_type × sourcing cell must be present — a gap is a load-time refusal (ADR-0001),
# never a default. Rates are amendable by written notice; the version + rate_ref freeze guarantees
# non-retroactivity. Normative source: Bruntsfield_Consultant_CommissionSchedule_TEMPLATE_v7.docx
# (referenced, never committed).
version: commissions-v7
currency: GBP

# --- Stream A — product commission (per product: Year-1 / Year-2 rate + window months) ---
products:
  connecttrade:
    name: ConnectTrade
    yr1_bps: 1500 # 15%
    yr2_bps: 1000 # 10%
    window_months: 24
  openbb:
    name: OpenBB
    yr1_bps: 1500 # 15%
    yr2_bps: 1000 # 10%
    window_months: 24
  brandfetch_distribution:
    name: Brandfetch (distribution)
    yr1_bps: 750 # 7.5%
    yr2_bps: 500 # 5%
    window_months: 24
  brandfetch_redistribution:
    name: Brandfetch (redistribution)
    yr1_bps: 375 # 3.75%
    yr2_bps: 375 # 3.75%
    window_months: 36
  benzinga:
    name: Benzinga
    # Benzinga pays Bruntsfield 30% of revenue for up to 36 months; the advisor's share is 15%
    # (Bruntsfield retains the other 15%) — in line with the other products. This schedule is the
    # ADVISOR's commission, so it carries the 15% advisor share, flat over the window.
    yr1_bps: 1500 # 15% advisor share
    yr2_bps: 1500 # 15% advisor share, flat over the attribution window
    window_months: 36 # up to 36 months from the initial sale to each customer

# --- Stream B — consultancy commission (delivery_type × sourcing → first-12mo / thereafter) ---
consultancy:
  bruntsfield_led: # Power Platform Assessment / methodology work
    self_sourced: { yr1_bps: 3000, thereafter_bps: 2500 } # 30% / 25%
    firm_sourced: { yr1_bps: 1500, thereafter_bps: 1000 } # 15% / 10%
  consultant_led: # bespoke, client-/consultant-determined scope
    self_sourced: { yr1_bps: 6500, thereafter_bps: 5500 } # 65% / 55%
    firm_sourced: { yr1_bps: 4500, thereafter_bps: 3500 } # 45% / 35%
