# Product→gap fit map (ADR-0039, GRS-0162) — which registry gaps each represented product
# addresses. Authored commercial judgment from the product-course research, kept as DATA so the
# sell-from-report join never string-matches course prose. Validated at load (fail loud,
# ADR-0001): every product here must exist in commissions.yaml, every key must exist in the
# registry, and EVERY catalogue product must appear here — an empty fit is an explicit decision.
version: product-fit-v1

products:
  openbb:
    # Research/data workspace + API — the course ties it to "a research/tooling infrastructure
    # gap" a Platform Power read surfaces.
    modules: [MARKET_DATA]
    c_modules: [CUST_RESEARCH_EDUCATION]
    powers: []
    pitch: >-
      OpenBB's research workspace closes a market-data / research-tooling infrastructure gap and
      lifts the research & education side of the customer proposition.
  benzinga:
    # News / ratings / signals content — the course ties it to "a market-content / engagement
    # gap: news, ratings and signals to enrich ticker pages".
    modules: [MARKET_DATA]
    c_modules: [CUST_RESEARCH_EDUCATION]
    powers: []
    pitch: >-
      An always-fresh Benzinga news / ratings / signals feed answers a market-content and
      engagement gap — enriched ticker pages and research surfaces that keep clients in-app.
  connecttrade:
    # OEMS / order-type execution stack (the GRS-0162 mapping: ConnectTrade → OEMS/order-types).
    modules: [OEMS, EMS_GATEWAY]
    c_modules: [CUST_TRADING_EXPERIENCE]
    powers: []
    pitch: >-
      ConnectTrade upgrades the order/execution stack — order types, routing and gateway depth —
      closing OEMS gaps that cap the trading experience.
  brandfetch_distribution:
    # Brand-asset API (distribution licence) — brand consistency across surfaces.
    modules: [CMS, FRONTEND]
    c_modules: [CUST_UI_NAVIGATION]
    powers: [BRANDING]
    pitch: >-
      Brandfetch's logo/brand API keeps every instrument and merchant surface on-brand — a fix
      for content-management and front-end consistency gaps that cheapen the UI.
  brandfetch_redistribution:
    modules: [CMS, FRONTEND]
    c_modules: [CUST_UI_NAVIGATION]
    powers: [BRANDING]
    pitch: >-
      Brandfetch under a redistribution licence — the same brand-asset coverage where the client
      re-serves assets to their own customers.
