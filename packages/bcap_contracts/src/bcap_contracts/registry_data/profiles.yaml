# Operating-model assessment profiles (ADR-0025). A profile is a validated VIEW over the registry
# superset: which modules apply to an operating model, plus optional profile-specific subcomponent
# additions and per-profile `critical` overrides. The registry stays the superset; a profile selects.
#
# `retail` is the default and MUST reproduce the v1 taxonomy exactly — its view is byte-identical to
# the full registry, so the golden master is unchanged. Non-retail profiles (exchange, wealth,
# infrastructure) are added as content in their own tickets (GRS-0078+).
#
# Criticals here layer over a base set still `draft-pending-ratification` (modules.yaml) — a later
# base ratification may change what a profile need only override.
status: draft-pending-ratification

profiles:
  retail:
    name: Retail brokerage
    # All nine superset modules, in superset order — the v1 default, byte-identical.
    modules:
      - FRONTEND
      - APP_SERVER
      - MARKET_DATA
      - ORCHESTRATION
      - CMS
      - BACKOFFICE
      - OEMS
      - EMS_GATEWAY
      - LIQ_CONNECT
    # No additions and no critical overrides: the retail view == the full registry.

  exchange:
    name: Exchange / market infrastructure
    # An exchange runs the trading platform, matching engine, market surveillance, member
    # connectivity, clearing & settlement, and market-data distribution — NOT a retail client CMS
    # (dropped). Modules selected in superset order; the additions below name what an exchange runs
    # that the retail L taxonomy never did. DRAFT structure authored from the ASX/NSE engagement
    # packs (reference-only, never committed); the exchange panel ratifies it.
    modules:
      - FRONTEND
      - APP_SERVER
      - MARKET_DATA
      - ORCHESTRATION
      - BACKOFFICE
      - OEMS
      - EMS_GATEWAY
      - LIQ_CONNECT
    subcomponent_additions:
      - key: OEMS_MATCHING_ENGINE
        name: Matching engine
        module_key: OEMS
        description: Order matching / auction engine — throughput, determinism, fairness, resilience.
        critical: true
      - key: BACKOFFICE_MARKET_SURVEILLANCE
        name: Market surveillance
        module_key: BACKOFFICE
        description: Real-time + post-trade surveillance, alerting, and case management (regulatory).
        critical: true
      - key: EMS_GATEWAY_MEMBER_CONNECTIVITY
        name: Member / participant connectivity
        module_key: EMS_GATEWAY
        description: Member gateways, session management, protocol coverage (FIX/binary), conformance.
      - key: LIQ_CONNECT_CLEARING_SETTLEMENT_IF
        name: Clearing & settlement interfaces
        module_key: LIQ_CONNECT
        description: CCP / CSD interfaces, trade feeds, novation and settlement instruction flows.
      - key: MARKET_DATA_DISTRIBUTION
        name: Market-data distribution
        module_key: MARKET_DATA
        description: Real-time + reference data dissemination to members and vendors; feed products.
    critical_overrides:
      # A broker's pre-trade risk gate is not the exchange's critical control — the matching engine
      # (added, critical) is. DRAFT judgement pending the exchange panel.
      OEMS_PRE_TRADE_RISK: false

  wealth:
    name: Wealth / investment management
    # A wealth / investment manager runs a client portal, the platform, reporting/data, workflow,
    # client management, and back-office custody — plus discretionary order management. It is NOT
    # scored on retail brokerage take-rate: its B is its own metric set (AUM, net-new-money, margin,
    # retention). The EMS member-gateway and liquidity-connectivity modules (brokerage/exchange
    # infra) are dropped. DRAFT structure + anchors pending the wealth panel (GRS-0147, ADR-0035).
    modules:
      - FRONTEND
      - APP_SERVER
      - MARKET_DATA
      - ORCHESTRATION
      - CMS
      - BACKOFFICE
      - OEMS
    # GRS-0147d: the infrastructure taxonomy is wealth-native. We keep the module KEYS (so scoring +
    # scoreability that address modules by key still resolve) but DROP every retail subcomponent from
    # each selected module and RENAME the module for a wealth manager — a wealth firm runs custody,
    # portfolio management, suitability and adviser tooling, not OEMS/watchlists/time-to-first-trade.
    subcomponent_selection:
      FRONTEND: []
      APP_SERVER: []
      MARKET_DATA: []
      ORCHESTRATION: []
      CMS: []
      BACKOFFICE: []
      OEMS: []
    module_name_overrides:
      FRONTEND: Client Portal & Planning
      APP_SERVER: Platform & AUM Economics
      MARKET_DATA: Investment Data & Research
      ORCHESTRATION: Advice Workflow & Investment Governance
      CMS: Client Management & Suitability
      BACKOFFICE: Custody, Settlement & CASS
      OEMS: Portfolio Management & Dealing
    subcomponent_additions:
      # --- Client Portal & Planning (FRONTEND) ---
      - key: WEALTH_PORTAL_EXPERIENCE
        name: Client portal experience
        module_key: FRONTEND
        description: Valuations, documents, secure messaging and mobile access for clients.
      - key: WEALTH_DIGITAL_ONBOARDING
        name: Digital onboarding & account opening
        module_key: FRONTEND
        description: KYC/AML, source-of-wealth capture and e-signature onboarding for new clients.
      - key: WEALTH_PLANNING_TOOLS
        name: Financial-planning tools
        module_key: FRONTEND
        description: Cashflow modelling, goal tracking and IHT/tax visualisation for clients and advisers.
      - key: WEALTH_ACCESSIBILITY
        name: Accessibility & vulnerable-client support
        module_key: FRONTEND
        description: Accessible journeys and support for vulnerable clients (Consumer Duty).
      # --- Platform & AUM Economics (APP_SERVER) ---
      - key: WEALTH_PLATFORM_RESILIENCE
        name: Platform resilience & availability
        module_key: APP_SERVER
        description: Uptime, disaster recovery and operational resilience of the wealth platform.
        critical: true
      - key: WEALTH_FEE_ADMIN
        name: Fee administration & billing accuracy
        module_key: APP_SERVER
        description: Tiered fee calculation, rebates, and billing reconciliation across mandates.
      - key: WEALTH_INTEGRATION
        name: Integration & APIs
        module_key: APP_SERVER
        description: Custodian, platform, planning-tool and data connectivity across the estate.
      - key: WEALTH_COST_TO_SERVE
        name: Cost-to-serve & straight-through processing
        module_key: APP_SERVER
        description: Operational efficiency and STP rates that drive platform economics.
      # --- Investment Data & Research (MARKET_DATA) ---
      - key: WEALTH_PRICING_DATA
        name: Pricing & valuation data quality
        module_key: MARKET_DATA
        description: Instrument coverage, corporate-action accuracy and timeliness of valuation data.
      - key: WEALTH_RESEARCH_INPUTS
        name: Research & model inputs
        module_key: MARKET_DATA
        description: Fund/security research and data feeding model-portfolio construction.
      - key: WEALTH_BENCHMARK_DATA
        name: Benchmark & performance-attribution data
        module_key: MARKET_DATA
        description: Benchmark reference data and performance-attribution inputs for reporting.
      # --- Advice Workflow & Investment Governance (ORCHESTRATION) ---
      - key: WEALTH_ADVICE_WORKFLOW
        name: Advice workflow orchestration
        module_key: ORCHESTRATION
        description: Fact-find → suitability → recommendation → periodic-review workflow across advisers.
      - key: WEALTH_INVESTMENT_GOVERNANCE
        name: Investment governance & PROD
        module_key: ORCHESTRATION
        description: CIO / investment-committee oversight and PROD target-market controls.
      - key: WEALTH_CHANGE_CONTROL
        name: Change control & model propagation
        module_key: ORCHESTRATION
        description: Controlled propagation of model-portfolio changes across client mandates.
      # --- Client Management & Suitability (CMS) ---
      - key: WEALTH_SUITABILITY
        name: Suitability & advice process (COBS 9A)
        module_key: CMS
        description: Objectives, risk profiling, suitability assessment & reports, and periodic review.
        critical: true
      - key: WEALTH_RISK_PROFILING
        name: Risk profiling & capacity for loss
        module_key: CMS
        description: Attitude-to-risk and capacity-for-loss assessment feeding mandate selection.
      - key: WEALTH_MANDATE_MIX
        name: Mandate mix & controls
        module_key: CMS
        description: Discretionary / advisory / execution mandate mix and per-mandate controls.
      - key: WEALTH_ONGOING_SERVICE
        name: Ongoing-service evidencing
        module_key: CMS
        description: Periodic-review scheduling and evidencing of ongoing service (Consumer Duty).
      # --- Custody, Settlement & CASS (BACKOFFICE) ---
      - key: WEALTH_CUSTODY_CASS
        name: Custody & client-asset (CASS) controls
        module_key: BACKOFFICE
        description: Segregation, reconciliation and CASS reporting — client-money and asset protection.
        critical: true
      - key: WEALTH_SETTLEMENT
        name: Settlement & reconciliation
        module_key: BACKOFFICE
        description: Trade, cash and stock settlement and daily reconciliation.
      - key: WEALTH_CORP_ACTIONS
        name: Corporate actions & income
        module_key: BACKOFFICE
        description: Corporate-action processing and income/dividend handling across custody.
      - key: WEALTH_CLIENT_MONEY
        name: Client-money handling
        module_key: BACKOFFICE
        description: Client-money receipt, segregation and disbursement controls.
      # --- Portfolio Management & Dealing (OEMS) ---
      - key: WEALTH_MODEL_PORTFOLIOS
        name: Model portfolios / MPS
        module_key: OEMS
        description: Construction and maintenance of model portfolios / managed portfolio services.
      - key: WEALTH_REBALANCING
        name: Rebalancing & drift management
        module_key: OEMS
        description: Rebalancing and drift management across client accounts and mandates.
      - key: WEALTH_ORDER_EXECUTION
        name: Order generation & best execution
        module_key: OEMS
        description: Order aggregation, allocation and best execution (MiFID II) for managed money.
      - key: WEALTH_DISCRETIONARY_CONTROLS
        name: Discretionary controls & restrictions
        module_key: OEMS
        description: Discretionary-mandate controls and enforcement of client investment restrictions.
    # The B index is wealth-native (GRS-0147 Phase 2): no retail superset metrics, its own set.
    metrics: []
    metric_additions:
      - key: WEALTH_AUM
        name: Assets Under Management
        description: >-
          Total client assets managed — the headline scale of a wealth manager, monetised at a fee
          margin over long client lifetimes.
        unit: GBP_bn
        direction: higher_is_better
        min_raw: 0
        group: scale
        status: draft-pending-ratification
        normalisation:
          method: piecewise_linear
          note: Anchors pinned to FY2024 UK wealth peers (SJP ~£190bn); pending the wealth panel.
          anchors:
            - {raw: 1, normalised: 0.15}
            - {raw: 18, normalised: 0.42}
            - {raw: 50, normalised: 0.62}
            - {raw: 120, normalised: 0.80}
            - {raw: 500, normalised: 0.95}
      - key: WEALTH_ADVISER_HEADCOUNT
        name: Adviser / RM headcount
        description: Client-facing advisers or relationship managers — the human capacity that carries AUM.
        unit: count
        direction: higher_is_better
        min_raw: 0
        group: scale
        status: draft-pending-ratification
        normalisation:
          method: piecewise_linear
          anchors:
            - {raw: 50, normalised: 0.20}
            - {raw: 300, normalised: 0.45}
            - {raw: 800, normalised: 0.65}
            - {raw: 2000, normalised: 0.78}
            - {raw: 4800, normalised: 0.90}
      - key: WEALTH_CLIENT_COUNT
        name: Client count
        description: Number of client relationships served — the demand base under management.
        unit: count
        direction: higher_is_better
        min_raw: 0
        group: scale
        status: draft-pending-ratification
        normalisation:
          method: piecewise_linear
          anchors:
            - {raw: 5000, normalised: 0.25}
            - {raw: 50000, normalised: 0.50}
            - {raw: 250000, normalised: 0.68}
            - {raw: 1000000, normalised: 0.85}
            - {raw: 2000000, normalised: 0.92}
      - key: WEALTH_REVENUE_MARGIN_BPS
        name: Revenue margin on AUM
        description: >-
          Net revenue as basis points of average AUM — the fee yield. Bounded above by a Consumer-Duty
          fair-value ceiling: an unexplained-high margin is a liability, not pure quality.
        unit: bps
        direction: higher_is_better
        min_raw: 0
        group: unit_economics
        status: draft-pending-ratification
        normalisation:
          method: piecewise_linear
          anchors:
            - {raw: 15, normalised: 0.25}
            - {raw: 25, normalised: 0.40}
            - {raw: 44, normalised: 0.60}
            - {raw: 65, normalised: 0.72}
            - {raw: 90, normalised: 0.82}
            - {raw: 150, normalised: 0.90}
      - key: WEALTH_COST_INCOME
        name: Cost / income ratio
        description: Operating cost as a share of income — lower is a more efficient, more resilient franchise.
        unit: percent
        direction: lower_is_better
        min_raw: 0
        group: unit_economics
        status: draft-pending-ratification
        normalisation:
          method: piecewise_linear
          anchors:
            - {raw: 45, normalised: 0.88}
            - {raw: 55, normalised: 0.75}
            - {raw: 64, normalised: 0.58}
            - {raw: 75, normalised: 0.35}
            - {raw: 85, normalised: 0.15}
      - key: WEALTH_AUM_PER_ADVISER
        name: AUM per adviser
        description: Average AUM carried per adviser — adviser productivity and operating leverage.
        unit: GBP_m
        direction: higher_is_better
        min_raw: 0
        group: unit_economics
        status: draft-pending-ratification
        normalisation:
          method: piecewise_linear
          anchors:
            - {raw: 20, normalised: 0.30}
            - {raw: 40, normalised: 0.45}
            - {raw: 80, normalised: 0.62}
            - {raw: 136, normalised: 0.75}
            - {raw: 250, normalised: 0.88}
      - key: WEALTH_RECURRING_REV_PCT
        name: Recurring revenue share
        description: Share of revenue that is recurring (ongoing advice / management fees) vs transactional.
        unit: percent
        direction: higher_is_better
        min_raw: 0
        group: unit_economics
        status: draft-pending-ratification
        normalisation:
          method: piecewise_linear
          anchors:
            - {raw: 50, normalised: 0.20}
            - {raw: 70, normalised: 0.45}
            - {raw: 85, normalised: 0.65}
            - {raw: 90, normalised: 0.75}
            - {raw: 98, normalised: 0.92}
      - key: WEALTH_NET_NEW_MONEY_RATE
        name: Net new money rate
        description: >-
          Organic net inflows as a percent of opening AUM (strips market beta) — the single best
          growth signal for a wealth manager. Legitimately NEGATIVE in a net-outflow year.
        unit: percent
        direction: higher_is_better
        group: momentum
        status: draft-pending-ratification
        normalisation:
          method: piecewise_linear
          anchors:
            - {raw: -3, normalised: 0.10}
            - {raw: 0, normalised: 0.35}
            - {raw: 3.7, normalised: 0.55}
            - {raw: 5, normalised: 0.72}
            - {raw: 7, normalised: 0.85}
            - {raw: 10, normalised: 0.93}
      - key: WEALTH_AUM_GROWTH
        name: AUM growth (total YoY)
        description: Total AUM growth year on year (flows + market). Can be negative in a down market.
        unit: percent
        direction: higher_is_better
        group: momentum
        status: draft-pending-ratification
        normalisation:
          method: piecewise_linear
          anchors:
            - {raw: -10, normalised: 0.10}
            - {raw: 0, normalised: 0.35}
            - {raw: 5, normalised: 0.55}
            - {raw: 12, normalised: 0.72}
            - {raw: 25, normalised: 0.90}
      - key: WEALTH_RETENTION
        name: Client / asset retention
        description: Annual client (or asset) retention rate — the durability of the AUM base.
        unit: percent
        direction: higher_is_better
        min_raw: 0
        group: momentum
        status: draft-pending-ratification
        normalisation:
          method: piecewise_linear
          anchors:
            - {raw: 80, normalised: 0.10}
            - {raw: 90, normalised: 0.45}
            - {raw: 94.5, normalised: 0.70}
            - {raw: 97, normalised: 0.90}
            - {raw: 99, normalised: 0.96}
