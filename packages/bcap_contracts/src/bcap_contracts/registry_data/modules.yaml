# The 9 infrastructure modules and their 51 subcomponents (the L index, Methodology §2).
#
# STATUS: draft-pending-ratification (GRS-0002; keys normalised GRS-0002a). The 9 module KEYS are
# settled structure. The 51 SUBCOMPONENTS below are populated from the prototype's authoritative
# draft (bruntsfield_advisory_assessment_wizard_v2/config/modules_subcomponents.yaml): labels are
# verbatim; descriptions are verbatim where the draft gave one and drafted from the label +
# domain otherwise. Every subcomponent KEY is fully qualified to <MODULE_KEY>_<LEAF> (GRS-0002a):
# the module-echo is stripped from the leaf before prefixing and an immediately-repeated token is
# collapsed (MARKET_DATA + DATA_DEPTH_QUALITY -> MARKET_DATA_DEPTH_QUALITY). Keys are GLOBALLY
# unique, enforced at load time. The `critical` flags (which subcomponents gate a module's rating,
# §5.2) are a DRAFT PROPOSAL for John's ratification — see docs/tickets/GRS-0002-registry-content.md.
# Rubric anchors (204) and the elicited weights are separate content tracks; renaming a key is
# an ADR, never a silent edit.

status: draft-pending-ratification

modules:
  - key: FRONTEND
    name: Front End
    description: Client- and advisor-facing UI, workflows, and presentation layer.
    subcomponents:
      - key: FRONTEND_PERFORMANCE
        name: Performance & Responsiveness
        description: Core Web Vitals, p95 load, responsiveness across devices.
        critical: true
      - key: FRONTEND_UX_NAVIGATION
        name: UX Coherence & Navigation
        description: Task flows for trade, deposit, support; user testing success.
        critical: true
      - key: FRONTEND_DEVICE_COVERAGE
        name: Device & Channel Coverage
        description: Mobile apps, web, feature parity.
      - key: FRONTEND_PERSONALISATION
        name: Personalisation & Recommendations
        description: Personalised dashboards, watchlists, suggestions.
      - key: FRONTEND_ACCESSIBILITY_LOCALISATION
        name: Accessibility & Localisation
        description: WCAG compliance, language/local formats.
      - key: FRONTEND_EXPERIMENTATION_ANALYTICS
        name: Experimentation & Product Analytics
        description: AB testing, product analytics, event tracking.

  - key: APP_SERVER
    name: Application Server
    description: Core application/business-logic tier and service orchestration runtime.
    subcomponents:
      - key: APP_SERVER_HOSTING_ELASTICITY
        name: Hosting & Elasticity
        description: Cloud/on-prem, autoscaling, regional redundancy.
      - key: APP_SERVER_RESILIENCE_DR
        name: Resilience & Disaster Recovery
        description: Failover, backups, RTO/RPO targets, tested DR runbooks.
        critical: true
      - key: APP_SERVER_API_DESIGN
        name: API Design & Integration
        description: API standards, versioning, and the partner/integration surface.
      - key: APP_SERVER_SECURITY_COMPLIANCE
        name: Security & Compliance
        description: AuthN/Z, encryption, vulnerability management, audit trails.
        critical: true
      - key: APP_SERVER_DEVOPS_DEPLOYMENT
        name: DevOps & Deployment
        description: CI/CD, release cadence, rollback, environment parity.
      - key: APP_SERVER_DATA_ARCHITECTURE
        name: Data Architecture & Domain Model
        description: Domain-model coherence, data ownership, lineage.
      - key: APP_SERVER_OBSERVABILITY
        name: Observability & Monitoring
        description: Metrics, logs, traces, alerting, SLO coverage.

  - key: MARKET_DATA
    name: Market Data
    description: Reference, pricing, and market-data ingestion, distribution, and quality.
    subcomponents:
      - key: MARKET_DATA_EXCHANGE_COVERAGE
        name: Exchange & Venue Coverage
        description: Breadth of exchanges and venues covered.
      - key: MARKET_DATA_INSTRUMENT_UNIVERSE
        name: Instrument Universe
        description: Asset classes and instruments referenced.
      - key: MARKET_DATA_DEPTH_QUALITY
        name: Depth & Quality of Data
        description: Order-book depth, corrections, reference-data accuracy.
        critical: true
      - key: MARKET_DATA_LATENCY_TIMELINESS
        name: Latency & Timeliness
        description: Feed latency and timeliness versus source.
        critical: true
      - key: MARKET_DATA_HISTORY_DEPTH
        name: History Depth
        description: Depth of historical data available.
      - key: MARKET_DATA_VENDOR_REDUNDANCY
        name: Vendor Redundancy & Entitlements
        description: Multi-vendor redundancy and entitlement management.
      - key: MARKET_DATA_VALUE_ADD_SERVICES
        name: Widgets / AI / Video Services
        description: Value-add data services — widgets, AI, video.

  - key: ORCHESTRATION
    name: Orchestration
    description: Workflow, scheduling, and inter-service orchestration and resilience.
    subcomponents:
      - key: ORCHESTRATION_WORKFLOW_ENGINE
        name: Workflow Engine Maturity
        description: Maturity of the workflow/orchestration engine.
        critical: true
      - key: ORCHESTRATION_ROUTING_LOGIC
        name: Routing Logic & Rules
        description: Routing rules and decision logic.
      - key: ORCHESTRATION_EVENT_DRIVEN
        name: Event-driven Architecture
        description: Event-driven patterns, messaging, idempotency.
      - key: ORCHESTRATION_CONFIG_VS_CODE
        name: Config vs Code
        description: Balance of configuration-driven versus hard-coded behaviour.
      - key: ORCHESTRATION_MONITORING
        name: Monitoring & Control
        description: Orchestration monitoring and operational control.

  - key: CMS
    name: Client Management System
    description: Client/account records, onboarding, KYC, research/CRM, and relationship data.
    subcomponents:
      - key: CMS_RESEARCH_AUTHORING
        name: Research Authoring & Tagging
        description: Authoring, tagging, and metadata for research content.
      - key: CMS_RESEARCH_DISTRIBUTION
        name: Research Distribution & Targeting
        description: Distribution and targeting of research to segments.
      - key: CMS_EMAIL_CAMPAIGNS
        name: Email & Campaign Engine
        description: Email/campaign engine and lifecycle messaging.
      - key: CMS_CRM_MODEL
        name: CRM Data Model & Integration
        description: CRM data-model coherence and system integration.
        critical: true
      - key: CMS_STATEMENTS
        name: Consolidated Statements
        description: Consolidated client-statement generation.
      - key: CMS_CONTENT_SEARCH_PERSONALISATION
        name: Search & Personalisation
        description: Content search and personalisation.

  - key: BACKOFFICE
    name: Back Office
    description: Settlement, reconciliation, custody, corporate actions, and reporting.
    subcomponents:
      - key: BACKOFFICE_CUSTODY
        name: Custody & Asset Servicing
        description: Custody, asset servicing, corporate actions.
        critical: true
      - key: BACKOFFICE_PAYMENTS_FUNDING
        name: Payments & Funding
        description: Payments, funding, and reconciliations.
      - key: BACKOFFICE_KYC_ONBOARDING
        name: KYC & Onboarding
        description: KYC/AML checks and client onboarding.
      - key: BACKOFFICE_PORTFOLIO_MGMT
        name: Portfolio Management
        description: Portfolio accounting and management.
      - key: BACKOFFICE_CREDIT_RISK
        name: Credit & Risk Engine
        description: Credit exposure and risk engine.
      - key: BACKOFFICE_REG_REPORTING
        name: Regulatory Reporting
        description: Regulatory-reporting completeness and timeliness.
        critical: true

  - key: OEMS
    name: Order & Execution Management
    description: Order lifecycle, smart order routing, and execution management (see §4 example).
    subcomponents:
      - key: OEMS_ASSET_COVERAGE
        name: Coverage by Asset Class
        description: Order/execution coverage across asset classes.
      - key: OEMS_EXEC_ALGOS
        name: Execution Algo Sophistication
        description: Execution-algorithm sophistication.
      - key: OEMS_PRE_TRADE_RISK
        name: Pre-trade Risk & Compliance
        description: Pre-trade risk and compliance checks.
        critical: true
      - key: OEMS_ORDER_TYPES
        name: Order Types & Complexity
        description: Supported order types and complexity.
      - key: OEMS_LATENCY_RELIABILITY
        name: Latency & Reliability
        description: Order-path latency and reliability.
      - key: OEMS_APIS_COLOCATION
        name: APIs & Co-location
        description: Execution APIs and co-location options.

  - key: EMS_GATEWAY
    name: EMS Gateway
    description: Execution-venue gateways, FIX connectivity, and session management.
    subcomponents:
      - key: EMS_GATEWAY_CONNECTIVITY
        name: Connectivity Breadth
        description: Breadth of venue/FIX connectivity.
      - key: EMS_GATEWAY_ROUTING_POLICY
        name: Routing Policy Sophistication
        description: Sophistication of routing policy.
      - key: EMS_GATEWAY_RISK_THROTTLING
        name: Risk & Throttling
        description: Gateway risk controls and throttling.
        critical: true
      - key: EMS_GATEWAY_MONITORING
        name: Monitoring & Diagnostics
        description: Gateway monitoring and diagnostics.

  - key: LIQ_CONNECT
    name: Liquidity & Connectivity
    description: Venue/liquidity connectivity, network infrastructure, and settlement links.
    subcomponents:
      - key: LIQ_CONNECT_LOCAL_EXCHANGES
        name: Local Exchange Connectivity
        description: Connectivity to local exchanges.
        critical: true
      - key: LIQ_CONNECT_FOREIGN_BROKERS
        name: Foreign Broker Relationships
        description: Foreign-broker relationships and reach.
      - key: LIQ_CONNECT_FUND_HOUSES
        name: Fund House Connectivity
        description: Connectivity to fund houses.
      - key: LIQ_CONNECT_SETTLEMENT_CLEARING
        name: Settlement & Clearing Links
        description: Settlement and clearing linkages.
        critical: true
