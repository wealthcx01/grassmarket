status: draft-pending-ratification

# --- Authored anchors (Methodology §4 worked example: OEMS Smart Order Routing) -----------
anchors:
  - subcomponent_key: OEMS_EXEC_ALGOS
    level: Basic
    status: authored
    statement: >-
      Orders route to a single default venue, or a human chooses the venue per order. There is no
      automated multi-venue routing.
    required_evidence:
      - Order-flow / routing configuration
      - Venue fill reports
    differentiator_questions:
      - Can any order reach more than one venue without a human deciding?
    misgrading_notes: >-
      A manual venue picker is Basic even if several venues are technically reachable — reachability
      is not routing.

  - subcomponent_key: OEMS_EXEC_ALGOS
    level: Developing
    status: authored
    statement: >-
      Static rule-based routing (e.g. by instrument or size). Routing rules change by software
      release, not adapted from live execution data.
    required_evidence:
      - Routing rule set
      - Rule change log
    differentiator_questions:
      - Are routing rules changed by release, or adapted from live execution data?
    misgrading_notes: >-
      Vendors often demo dynamic routing that is disabled in production — verify the production
      config (E3+), not the sales environment.

  - subcomponent_key: OEMS_EXEC_ALGOS
    level: Advanced
    status: authored
    statement: >-
      Data-driven routing with venue cost/fill models, monitored fill-quality KPIs, and at least
      quarterly recalibration.
    required_evidence:
      - Smart-order-routing model documentation
      - Fill-quality dashboard
      - Recalibration records
    differentiator_questions:
      - Is routing driven by a cost/fill model whose parameters are recalibrated on a schedule?
    misgrading_notes: >-
      Recalibration must be evidenced by records, not asserted; a stale model that is "data-driven"
      in principle is still Developing.

  - subcomponent_key: OEMS_EXEC_ALGOS
    level: Frontier
    status: authored
    statement: >-
      Adaptive routing with real-time venue analytics and a measurable execution-quality advantage
      versus benchmark.
    required_evidence:
      - Real-time venue analytics
      - Execution-quality benchmark comparison
    differentiator_questions:
      - Is there a measured execution-quality advantage versus a benchmark, not just adaptivity?
    misgrading_notes: >-
      Frontier is rational for flow-heavy multi-venue brokers; it is NOT economically rational for a
      single-market wealth platform — do not treat it as the target there (§3.1).

  # === CRITICAL (★) subcomponents — these gate module ratings (§5.2). Authored first. =======

  # --- FRONTEND ★ Performance & Responsiveness ---------------------------------------------
  - subcomponent_key: FRONTEND_PERFORMANCE
    level: Basic
    status: authored
    statement: >-
      Screens are slow and untested. There are no performance budgets and p95 load is unknown;
      advisors and clients routinely wait on spinners, and regressions ship unnoticed because
      nothing measures Core Web Vitals or load time.
    required_evidence:
      - Live page-load observation across the main task screens (trade, deposit, dashboard)
      - Confirmation that no performance dashboard or monitoring exists
    differentiator_questions:
      - Is p95 load time for the main task flows measured at all, or only guessed at from feel?
    misgrading_notes: >-
      A fast marketing homepage is not the authenticated app — measure the actual trade/deposit
      flows, not the landing page. Absence of any field measurement caps this at Basic.

  - subcomponent_key: FRONTEND_PERFORMANCE
    level: Developing
    status: authored
    statement: >-
      Performance is measured occasionally (ad-hoc Lighthouse/PageSpeed runs) but no budgets are
      enforced in CI. p95 is known for a few pages only, degrades on mid-range devices or under
      load, and fixes are reactive after users complain.
    required_evidence:
      - Ad-hoc Lighthouse / PageSpeed reports for key pages
      - A p95 figure for at least the main screens
      - Evidence that CI has no performance-budget gate
    differentiator_questions:
      - Do performance regressions block a release, or are they only found after users complain?
    misgrading_notes: >-
      Occasional lab runs are not continuous monitoring — a screenshot of one good Lighthouse
      score is not a cadence. Grade on whether regressions are caught before release.

  - subcomponent_key: FRONTEND_PERFORMANCE
    level: Advanced
    status: authored
    statement: >-
      Core Web Vitals (LCP/INP/CLS) and p95 load are tracked continuously with dashboards and
      alerting. Performance budgets are enforced in CI so regressions block release, and targets
      are met across device tiers and documented.
    required_evidence:
      - Core Web Vitals / p95 dashboard with alerting
      - CI performance-budget configuration that fails the build on regression
      - Device-tier test-matrix results
    differentiator_questions:
      - Is a performance budget enforced automatically in the pipeline, or is it a guideline?
    misgrading_notes: >-
      Lab/synthetic scores can look great while real users on mid-range mobiles suffer — confirm
      the targets hold in field/RUM data, not just a clean CI lab run.

  - subcomponent_key: FRONTEND_PERFORMANCE
    level: Frontier
    status: authored
    statement: >-
      Performance is a differentiator: sub-second interactions, real-user monitoring (RUM)
      segmented by geography and device, per-commit budget gating, and a measured link between
      speed and a business outcome (conversion, engagement, retention).
    required_evidence:
      - RUM dashboard segmented by device and geography
      - Per-commit performance-budget gating in the deployment pipeline
      - A study linking latency to a business metric
    differentiator_questions:
      - Is real-user performance monitored in production and tied to a business outcome, not just
        synthetic lab tests?
    misgrading_notes: >-
      Frontier here is warranted for high-traffic, self-serve retail/mass-market platforms; a
      low-volume advisory-only tool does not need RUM at that scale — do not treat it as the
      target (§3.1). RUM must be field data, not more lab tooling relabelled.

  # --- FRONTEND ★ UX Coherence & Navigation ------------------------------------------------
  - subcomponent_key: FRONTEND_UX_NAVIGATION
    level: Basic
    status: authored
    statement: >-
      Navigation is inconsistent across the product and core task flows (trade, deposit, support)
      are hard to find or need workarounds. There is no usability testing; users get lost or call
      support to complete basic tasks.
    required_evidence:
      - Live walk-through of the core flows showing dead ends or inconsistent patterns
      - Confirmation that no usability testing has been done
    differentiator_questions:
      - Can a new user complete the top three task flows without contacting support?
    misgrading_notes: >-
      A polished visual design can mask a broken flow — grade the completion of the trade,
      deposit and support tasks, not the aesthetics.

  - subcomponent_key: FRONTEND_UX_NAVIGATION
    level: Developing
    status: authored
    statement: >-
      Main flows work but inconsistencies persist — different patterns per module, occasional
      dead ends. Some usability feedback is gathered informally, but task-success rates are not
      measured and new features bolt on their own navigation.
    required_evidence:
      - An information-architecture / navigation map (even if inconsistent)
      - Informal user-feedback notes
      - Evidence that task-success rates are not measured
    differentiator_questions:
      - Are task-success rates measured from real usability testing, or asserted from the team's
        intuition?
    misgrading_notes: >-
      The existence of a style guide is not consistency — check whether modules actually share
      navigation patterns in production, or each invented its own.

  - subcomponent_key: FRONTEND_UX_NAVIGATION
    level: Advanced
    status: authored
    statement: >-
      A coherent information architecture and consistent navigation patterns, enforced by a design
      system. Key task flows (trade, deposit, support) are validated by usability testing with
      measured completion/success rates, and the IA is documented.
    required_evidence:
      - Usability-test reports with task-success rates for trade/deposit/support
      - A design system / shared component library in active use
      - Information-architecture documentation
    differentiator_questions:
      - Are the core journeys validated by measured usability testing, not just design review?
    misgrading_notes: >-
      Design-system existence is not adoption — verify new modules actually consume it in prod.
      Usability "testing" must have measured task-success numbers, not a heuristic walkthrough.

  - subcomponent_key: FRONTEND_UX_NAVIGATION
    level: Frontier
    status: authored
    statement: >-
      UX is a competitive asset: continuous usability research, task-success and time-on-task
      tracked as product KPIs, accessibility-first patterns, and journey friction measured from
      product analytics and actively reduced release over release.
    required_evidence:
      - An ongoing UX-research cadence with logged studies
      - Product-analytics funnels for the key journeys with completion KPIs
      - Drop-off / friction analysis feeding the roadmap
    differentiator_questions:
      - Is journey friction measured continuously and driven down as a tracked KPI, or reviewed
        only when someone complains?
    misgrading_notes: >-
      Frontier matters most for self-serve mass-market platforms; a concierge advisory model with
      few power-users rationally needs less — do not present it as the universal target (§3.1).

  # --- APP_SERVER ★ Resilience & Disaster Recovery -----------------------------------------
  - subcomponent_key: APP_SERVER_RESILIENCE_DR
    level: Basic
    status: authored
    statement: >-
      There is no tested DR plan. Backups are ad-hoc or unverified, failover is manual or absent,
      and a single-node or single-region failure takes the platform down. RTO/RPO are undefined.
    required_evidence:
      - Backup configuration (or evidence of its absence)
      - Confirmation that no DR test or restore drill has occurred
    differentiator_questions:
      - Has a backup ever been successfully restored, and what happens today if the primary node
        fails?
    misgrading_notes: >-
      Backups that have never been restored are unproven — ask for the last successful restore,
      not the last backup job.

  - subcomponent_key: APP_SERVER_RESILIENCE_DR
    level: Developing
    status: authored
    statement: >-
      Backups run and a DR plan exists on paper, but restores are rarely or never tested. RTO/RPO
      are defined but unvalidated, failover is manual and slow, and single points of failure
      remain in critical services.
    required_evidence:
      - A written DR plan with RTO/RPO targets
      - Backup schedule and logs
      - Absence of a dated restore-test or failover-drill record
    differentiator_questions:
      - When was the last full restore or failover actually tested — with a dated result, not a
        plan?
    misgrading_notes: >-
      A documented DR plan is not a tested one — a plan with no dated restore drill is Developing,
      not Advanced, however thorough the document looks.

  - subcomponent_key: APP_SERVER_RESILIENCE_DR
    level: Advanced
    status: authored
    statement: >-
      RTO/RPO targets are defined and DR is tested on a schedule (restore drills, failover
      exercises) with documented results. Automated backups are verified by restore, critical
      services are redundant across zones, and runbooks are maintained.
    required_evidence:
      - Dated DR-test / failover-drill reports with outcomes against RTO/RPO
      - Verified restore records
      - Multi-zone redundancy topology for critical services and a maintained DR runbook
    differentiator_questions:
      - Is DR exercised on a schedule with measured recovery times, or only planned?
    misgrading_notes: >-
      "We could fail over" is not evidence — require a dated drill. A plan that meets RTO on paper
      but has never been exercised has not earned Advanced.

  - subcomponent_key: APP_SERVER_RESILIENCE_DR
    level: Frontier
    status: authored
    statement: >-
      Resilience is continuously proven: automated failover, active-active or rapid multi-region
      recovery, chaos/GameDay exercises, and RTO/RPO continuously measured against real and
      simulated events.
    required_evidence:
      - Chaos-engineering / GameDay reports
      - Automated-failover evidence and multi-region topology
      - Recovery telemetry from a real or simulated zone/region loss
    differentiator_questions:
      - Does the system recover automatically from a zone or region loss, or does recovery still
        require a manual runbook?
    misgrading_notes: >-
      Multi-region active-active is warranted for always-on trading/custody at scale; a regional
      wealth platform may rationally target tested single-region recovery — do not over-target it
      (§3.1).

  # --- APP_SERVER ★ Security & Compliance --------------------------------------------------
  - subcomponent_key: APP_SERVER_SECURITY_COMPLIANCE
    level: Basic
    status: authored
    statement: >-
      AuthN/Z is weak or inconsistent, secrets live in code or config, there is no vulnerability
      scanning, and audit trails are absent or incomplete. Encryption at rest and in transit is
      patchy and security is purely reactive.
    required_evidence:
      - Live inspection of the auth flow and config for plaintext secrets
      - Confirmation that no vulnerability scanning runs
    differentiator_questions:
      - Are credentials and access controls enforced consistently, or are there plaintext secrets
        and shared logins in production?
    misgrading_notes: >-
      A security policy PDF is not a running control — verify in the prod config (E3/E4), for
      example that secrets are not in the repo, before crediting anything above Basic.

  - subcomponent_key: APP_SERVER_SECURITY_COMPLIANCE
    level: Developing
    status: authored
    statement: >-
      Basic controls exist (auth, TLS, some access control) but gaps remain: irregular patching,
      no formal vulnerability management, partial audit logging, and no penetration-testing
      cadence. Compliance evidence is assembled ad-hoc under deadline.
    required_evidence:
      - Access-control policy and TLS/encryption configuration
      - Patch history showing irregular cadence
      - Absence of an independent penetration-test report
    differentiator_questions:
      - Is there a regular vulnerability-management and patching process, or is patching reactive?
    misgrading_notes: >-
      A clean scan the vendor chose to show you is not a scanning cadence — ask for the schedule
      and the backlog of open findings. Partial audit logging is not tamper-evident audit.

  - subcomponent_key: APP_SERVER_SECURITY_COMPLIANCE
    level: Advanced
    status: authored
    statement: >-
      Enforced AuthN/Z (RBAC/least-privilege), encryption at rest and in transit, managed secrets,
      regular vulnerability scanning with patching SLAs, complete tamper-evident audit trails, and
      periodic third-party penetration tests with tracked remediation.
    required_evidence:
      - RBAC/IAM configuration and secrets-management setup
      - Vulnerability-scan reports with remediation SLAs
      - A third-party penetration-test report within the last 12 months with tracked findings
      - Audit-log samples
    differentiator_questions:
      - Is there an independent penetration test within the last 12 months with tracked
        remediation, or only internal assurance?
    misgrading_notes: >-
      Vendors show the policy, not the enforcement — confirm RBAC is actually enforced in prod and
      the pen-test findings are being closed, not just filed.

  - subcomponent_key: APP_SERVER_SECURITY_COMPLIANCE
    level: Frontier
    status: authored
    statement: >-
      Security is a demonstrable strength: continuous automated security testing in CI/CD, threat
      modelling, SIEM with active detection and response, a maintained recognised certification
      (e.g. SOC 2 / ISO 27001), and audit trails that support real-time compliance reporting.
    required_evidence:
      - SAST/DAST integrated in the CI pipeline
      - SIEM / detection-and-response dashboards
      - A current SOC 2 / ISO 27001 certificate or audit report, plus threat-model documentation
    differentiator_questions:
      - Are security tests automated in the deployment pipeline and backed by continuous
        monitoring, or point-in-time?
    misgrading_notes: >-
      Formal certification is expected where institutional clients or regulators demand it; a
      small B2B tool may rationally stop at Advanced — do not treat certification as universally
      required (§3.1).

  # --- MARKET_DATA ★ Depth & Quality of Data -----------------------------------------------
  - subcomponent_key: MARKET_DATA_DEPTH_QUALITY
    level: Basic
    status: authored
    statement: >-
      Prices are last-trade or delayed snapshots only, with no order-book depth. Reference data
      (corporate actions, splits, symbology) is maintained manually and is error-prone;
      corrections are missed and bad ticks reach users.
    required_evidence:
      - Live inspection of a quote showing last-trade / delayed data only
      - Confirmation that reference data is maintained manually
    differentiator_questions:
      - When a price is wrong or a corporate action is missed, is it caught by an automated check
        or by a user complaint?
    misgrading_notes: >-
      A rich data feed in the demo may be a premium entitlement not licensed in prod — check the
      actual production entitlements and depth level, not the sales environment.

  - subcomponent_key: MARKET_DATA_DEPTH_QUALITY
    level: Developing
    status: authored
    statement: >-
      Some depth (top-of-book) and reference data exist but quality is inconsistent. Corrections
      and adjustments are handled reactively, there are no systematic data-quality checks, and
      stale or erroneous data surfaces before anyone catches it.
    required_evidence:
      - Data-feed spec showing top-of-book coverage
      - A corporate-actions handling process
      - Evidence that no automated data-quality checks run
    differentiator_questions:
      - Is order-book depth actually captured and stored, or only top-of-book?
    misgrading_notes: >-
      Reference-data "accuracy" is only credible with monitoring — ask how a missed split would be
      detected. Reactive correction after a complaint is Developing, not Advanced.

  - subcomponent_key: MARKET_DATA_DEPTH_QUALITY
    level: Advanced
    status: authored
    statement: >-
      Full order-book depth where relevant, accurate reference data with automated corporate-action
      processing, systematic data-quality validation (outlier/gap detection, cross-source checks),
      and monitored data-quality metrics with alerting.
    required_evidence:
      - Data-quality monitoring dashboard (gap/outlier detection)
      - Corporate-action processing logs
      - Reference-data accuracy metrics and a depth-of-book sample
    differentiator_questions:
      - Are data-quality problems detected by automated validation before they reach users?
    misgrading_notes: >-
      Automated corporate-actions coverage is often partial (mandatory events only) — check
      voluntary/election handling, not just dividends, before crediting full processing.

  - subcomponent_key: MARKET_DATA_DEPTH_QUALITY
    level: Frontier
    status: authored
    statement: >-
      Data quality is a differentiator: real-time cross-vendor validation, automated anomaly
      detection with auto-correction, full L2/L3 depth, and measured quality SLAs published to
      data consumers.
    required_evidence:
      - Cross-vendor validation / reconciliation configuration
      - Anomaly-detection and auto-correction logs
      - A published data-quality SLA and its compliance report
    differentiator_questions:
      - Is data continuously validated across vendors with automated correction, or checked
        against a single source?
    misgrading_notes: >-
      Full L2/L3 depth matters for active-trading/execution platforms; a long-only wealth platform
      may rationally need only clean top-of-book and reference data — do not over-target (§3.1).

  # --- MARKET_DATA ★ Latency & Timeliness --------------------------------------------------
  - subcomponent_key: MARKET_DATA_LATENCY_TIMELINESS
    level: Basic
    status: authored
    statement: >-
      Data is delayed (e.g. 15-minute) or of unknown latency, with no measurement. Users cannot
      tell whether a quote is current, and timeliness problems are discovered anecdotally.
    required_evidence:
      - Live check of a quote's timestamp versus wall-clock showing delay
      - Confirmation that latency is not measured
    differentiator_questions:
      - Is the data known to be real-time or delayed, and is that latency actually measured?
    misgrading_notes: >-
      "Real-time" on a marketing page often means 15-minute delayed in prod for the entitlement
      actually purchased — verify the licensed feed, not the brochure.

  - subcomponent_key: MARKET_DATA_LATENCY_TIMELINESS
    level: Developing
    status: authored
    statement: >-
      Latency is roughly known for the main feeds but not measured continuously against source.
      Occasional lag spikes occur, there is no alerting on staleness, and timeliness varies by
      feed with no SLA.
    required_evidence:
      - Feed documentation stating expected latency
      - Anecdotal lag / staleness reports
      - Absence of continuous latency monitoring
    differentiator_questions:
      - Is feed latency measured continuously against the source timestamp, or just assumed from
        the vendor's spec sheet?
    misgrading_notes: >-
      A vendor's stated latency is a spec, not a measurement — Developing means nobody is watching
      staleness in prod. No heartbeat/staleness alert caps it here.

  - subcomponent_key: MARKET_DATA_LATENCY_TIMELINESS
    level: Advanced
    status: authored
    statement: >-
      Feed latency is measured continuously against source timestamps, with staleness/heartbeat
      monitoring and alerting. Timeliness SLAs are defined per feed and met, and the system fails
      over to a backup feed on lag or gap.
    required_evidence:
      - Latency/staleness monitoring dashboard with source-timestamp deltas
      - Per-feed timeliness SLA
      - Alerting and feed-failover configuration
    differentiator_questions:
      - Does the platform alert and fail over when a feed goes stale, or does it keep showing old
        prices?
    misgrading_notes: >-
      A single average-latency number hides tail lag — confirm staleness alerting exists, not just
      a mean figure on a dashboard.

  - subcomponent_key: MARKET_DATA_LATENCY_TIMELINESS
    level: Frontier
    status: authored
    statement: >-
      Latency is a competitive edge: low latency measured end-to-end with percentiles, co-located
      or direct feeds where relevant, continuous latency telemetry, and enforced latency budgets
      with a breach-response process.
    required_evidence:
      - End-to-end latency telemetry with percentiles (p50/p99)
      - Co-location / direct-feed evidence
      - Enforced latency budgets and a breach-response record
    differentiator_questions:
      - Are latency percentiles monitored end-to-end with enforced budgets, or is "real-time" just
        a label?
    misgrading_notes: >-
      Ultra-low latency matters for execution/HFT-adjacent platforms; a wealth or research platform
      rationally targets real-time-enough with monitored staleness, not microseconds (§3.1).

  # --- ORCHESTRATION ★ Workflow Engine Maturity --------------------------------------------
  - subcomponent_key: ORCHESTRATION_WORKFLOW_ENGINE
    level: Basic
    status: authored
    statement: >-
      Processes are hard-coded, scripted, or run manually. There is no workflow engine;
      long-running processes have no state tracking, retries, or visibility, and failures require
      manual intervention and re-runs.
    required_evidence:
      - Inspection of how a multi-step process runs (scripts / manual steps)
      - Confirmation that no workflow engine exists
    differentiator_questions:
      - When a multi-step process fails halfway, does anything track its state, or does someone
        re-run it by hand?
    misgrading_notes: >-
      A cron scheduler is not a workflow engine — scheduled jobs without durable state, retries,
      and recovery are Basic/Developing however reliable the schedule.

  - subcomponent_key: ORCHESTRATION_WORKFLOW_ENGINE
    level: Developing
    status: authored
    statement: >-
      Some workflow tooling or scheduled jobs exist, but state, retries, and error handling are
      inconsistent and partly hard-coded. Workflows are brittle, failures are handled reactively,
      and there is limited visibility into in-flight processes.
    required_evidence:
      - Scheduler / job configuration
      - Examples of workflow definitions
      - Evidence of inconsistent retry or error handling
    differentiator_questions:
      - Are workflows defined declaratively and versioned, or embedded in application code?
    misgrading_notes: >-
      Check whether "orchestration" survives a mid-run crash, not just the happy-path demo — a
      workflow that cannot resume from state is Developing.

  - subcomponent_key: ORCHESTRATION_WORKFLOW_ENGINE
    level: Advanced
    status: authored
    statement: >-
      A managed workflow/orchestration engine provides durable state, automatic retries,
      idempotency, error handling, and observability. Workflows are versioned and declarative, and
      in-flight and failed workflows are visible and recoverable.
    required_evidence:
      - Workflow-engine configuration with retry / idempotency settings
      - A monitoring view of in-flight and failed workflows
      - Versioned, declarative workflow definitions
    differentiator_questions:
      - When a step fails, does the workflow retry and resume from durable state automatically?
    misgrading_notes: >-
      A tool with a nice UI is not durability — confirm state survives process restart and failed
      runs can be resumed, not just re-triggered from the start.

  - subcomponent_key: ORCHESTRATION_WORKFLOW_ENGINE
    level: Frontier
    status: authored
    statement: >-
      Orchestration is a strength: self-healing workflows, dynamic/adaptive routing, full audit
      and replay, SLA-tracked processes, and business users can safely author and modify flows.
    required_evidence:
      - Self-healing / auto-remediation configuration
      - Workflow replay / audit logs
      - Per-process SLA dashboards and business-user authoring tooling
    differentiator_questions:
      - Can workflows self-heal and be replayed for audit, and can non-engineers safely change
        them?
    misgrading_notes: >-
      A sophisticated engine is warranted where many long-running multi-step processes exist; a
      simple CRUD platform does not need a heavyweight orchestrator — do not over-target (§3.1).

  # --- CMS ★ CRM Data Model & Integration --------------------------------------------------
  - subcomponent_key: CMS_CRM_MODEL
    level: Basic
    status: authored
    statement: >-
      Client and relationship data is fragmented across spreadsheets and disconnected systems,
      with duplicate and conflicting records. There is no single client view, and integration is
      manual re-keying.
    required_evidence:
      - Inspection of where client data lives (spreadsheets / disconnected systems)
      - Examples of duplicate or conflicting client records
    differentiator_questions:
      - Is there one authoritative client record, or is the client view stitched together from
        several systems each time?
    misgrading_notes: >-
      The presence of a named CRM product does not mean an integrated data model — check whether
      other systems actually read/write it or keep their own client copies.

  - subcomponent_key: CMS_CRM_MODEL
    level: Developing
    status: authored
    statement: >-
      A CRM exists but the data model is inconsistent (duplicates, unclear ownership). Integration
      to other systems is partial or batch/manual, a single client view is assembled with effort,
      and data quality is unmanaged.
    required_evidence:
      - CRM data-model / schema
      - Integration inventory showing batch or manual links
      - Evidence of unmanaged duplicate records
    differentiator_questions:
      - Do other systems integrate with the CRM automatically, or is client data re-keyed between
        them?
    misgrading_notes: >-
      A "single client view" screen may be a read-only mashup, not a governed source — ask where
      the data is actually mastered before crediting integration.

  - subcomponent_key: CMS_CRM_MODEL
    level: Advanced
    status: authored
    statement: >-
      A coherent CRM data model with clear entity ownership and a single client view, integrated
      via APIs with core systems so client data is consistent across the platform. Data-quality
      rules (dedup, validation) and stewardship are in place.
    required_evidence:
      - Documented data model with entity ownership
      - API-integration configuration to core systems
      - Data-quality / dedup rules, a stewardship process, and a single-client-view screen
    differentiator_questions:
      - Is client data consistent across the estate because systems integrate with one model, or
        reconciled after the fact?
    misgrading_notes: >-
      Integration claims should be verified at the API level — confirm systems actually read/write
      the model rather than syncing overnight copies.

  - subcomponent_key: CMS_CRM_MODEL
    level: Frontier
    status: authored
    statement: >-
      The CRM is a strategic asset: a unified real-time client data model (single source of truth)
      integrated bidirectionally across the estate, with a 360-degree view, event-driven updates,
      and analytics/segmentation built on trusted data.
    required_evidence:
      - Real-time bidirectional integration architecture
      - A 360-degree client view backed by a single source of truth
      - Event-driven update logs and segmentation/analytics built on the model
    differentiator_questions:
      - Do client updates propagate across the estate in real time from a single source of truth,
        or via overnight batch?
    misgrading_notes: >-
      A CDP-grade unified model matters for firms competing on relationship intelligence; a small
      advisory book may rationally stop at a clean, integrated CRM — do not over-target (§3.1).

  # --- BACKOFFICE ★ Custody & Asset Servicing ----------------------------------------------
  - subcomponent_key: BACKOFFICE_CUSTODY
    level: Basic
    status: authored
    statement: >-
      Custody positions are reconciled manually and infrequently. Corporate actions are processed
      by hand from notices, often late or missed; there are no asset-servicing SLAs, and breaks are
      discovered late and resolved ad-hoc.
    required_evidence:
      - Inspection of the reconciliation method (manual / spreadsheet)
      - Examples of missed or late corporate actions
    differentiator_questions:
      - When a custody position breaks or a corporate action is due, is it caught by a process or
        found by luck?
    misgrading_notes: >-
      A daily reconciliation report does not mean automated break management — if breaks are still
      chased by email and spreadsheet it is Basic/Developing.

  - subcomponent_key: BACKOFFICE_CUSTODY
    level: Developing
    status: authored
    statement: >-
      Reconciliation runs (often daily) but break investigation is manual. Corporate actions are
      handled semi-manually with a checklist, some SLAs exist but are not consistently met, and
      asset servicing is reactive under volume.
    required_evidence:
      - Reconciliation run logs
      - A corporate-actions processing checklist
      - SLA definitions with evidence of misses
    differentiator_questions:
      - Are corporate-action entitlements and elections processed systematically, or case-by-case
        from notices?
    misgrading_notes: >-
      Corporate-actions coverage is often partial — mandatory events (dividends) may be handled
      while voluntary/election events are not; check the full lifecycle.

  - subcomponent_key: BACKOFFICE_CUSTODY
    level: Advanced
    status: authored
    statement: >-
      Automated custody reconciliation with exception-based break management, systematic
      corporate-actions processing (capture, entitlement calculation, election handling) against
      monitored SLAs, and full audit trails for asset servicing.
    required_evidence:
      - Automated reconciliation with a break-exception dashboard
      - Corporate-action processing records (entitlements, elections) against monitored SLAs
      - Asset-servicing audit trail
    differentiator_questions:
      - Are custody breaks worked by an automated exception process against an SLA, or manually
        chased?
    misgrading_notes: >-
      Automation must cover break management, not just the reconciliation run — a matched-vs-unmatched
      report that humans then work by hand is Developing.

  - subcomponent_key: BACKOFFICE_CUSTODY
    level: Frontier
    status: authored
    statement: >-
      Custody and asset servicing is a strength: near-real-time multi-custodian reconciliation,
      straight-through corporate-actions processing with automated elections, predictive break
      detection, and SLA performance reported to clients.
    required_evidence:
      - Multi-custodian real-time reconciliation architecture
      - Straight-through corporate-action processing logs
      - Predictive break-detection metrics and client-facing SLA performance reports
    differentiator_questions:
      - Is reconciliation near-real-time across multiple custodians with predictive break
        detection, or end-of-day single-custodian?
    misgrading_notes: >-
      Multi-custodian STP matters for a scaled custodian/platform; a single-custodian wealth firm
      may rationally target automated single-custodian reconciliation — do not over-target (§3.1).

  # --- BACKOFFICE ★ Regulatory Reporting ---------------------------------------------------
  - subcomponent_key: BACKOFFICE_REG_REPORTING
    level: Basic
    status: authored
    statement: >-
      Regulatory reports are compiled manually from extracts each period — error-prone and late,
      with no validation before submission. Reporting scope may have gaps and the audit trail is
      thin.
    required_evidence:
      - Inspection of how a report is produced (manual extract / spreadsheet)
      - Evidence of late or corrected submissions
    differentiator_questions:
      - Is each report assembled by hand from extracts, or generated from system data?
    misgrading_notes: >-
      Meeting deadlines by heroic manual effort is not maturity — a report assembled by hand each
      quarter is Basic/Developing however punctual.

  - subcomponent_key: BACKOFFICE_REG_REPORTING
    level: Developing
    status: authored
    statement: >-
      Reports are largely produced from system data with some manual assembly. Deadlines are
      usually met but with last-minute effort, validation is partial, regulatory changes are
      handled reactively, and occasional resubmissions occur.
    required_evidence:
      - Report-generation process with manual steps documented
      - Submission history showing deadline pressure or resubmissions
      - Partial validation checks
    differentiator_questions:
      - Are reports validated against the regulator's rules before submission, or is the first
        check the regulator's rejection?
    misgrading_notes: >-
      Check completeness of scope (all applicable regimes and fields), not just that something is
      filed on time — a partial-scope report filed punctually is still Developing.

  - subcomponent_key: BACKOFFICE_REG_REPORTING
    level: Advanced
    status: authored
    statement: >-
      Automated regulatory-report generation with pre-submission validation rules, complete
      coverage of applicable regimes, monitored deadlines reconciled to source, full audit trails,
      and a controlled process for regulatory-change updates.
    required_evidence:
      - Automated report-generation configuration with a validation-rule set
      - Submission calendar with an on-time record and reconciliation-to-source evidence
      - Audit trail and a regulatory-change control process
    differentiator_questions:
      - Are reports generated and validated automatically against the applicable regime before
        submission?
    misgrading_notes: >-
      Validation must be against the regulator's actual schema/rules, not a generic sanity check —
      confirm the rule set matches the regime, and that scope is complete.

  - subcomponent_key: BACKOFFICE_REG_REPORTING
    level: Frontier
    status: authored
    statement: >-
      Regulatory reporting is a strength: near-real-time/on-demand reporting, automated validation
      against regulator schemas, exception dashboards, proactive regulatory-change management, and
      demonstrable lineage from report back to source transaction.
    required_evidence:
      - On-demand / real-time reporting capability
      - Schema-validation and exception dashboards
      - Data-lineage from report field to source transaction and a proactive regulatory-change
        register
    differentiator_questions:
      - Can any reported figure be traced automatically back to its source transaction, and can
        reports be produced on demand?
    misgrading_notes: >-
      On-demand transaction reporting matters for firms under MiFIR/EMIR-scale obligations; a
      lightly-regulated firm rationally targets accurate, timely periodic reporting (§3.1).

  # --- OEMS ★ Pre-trade Risk & Compliance --------------------------------------------------
  - subcomponent_key: OEMS_PRE_TRADE_RISK
    level: Basic
    status: authored
    statement: >-
      There are few or no automated pre-trade checks. Limits and restrictions are enforced manually
      or after the fact, fat-finger, credit, and restricted-list breaches can reach the market, and
      compliance is post-trade only.
    required_evidence:
      - Inspection of the order path for automated checks (their absence)
      - Evidence that compliance checking is post-trade
    differentiator_questions:
      - Can an obviously wrong or non-compliant order reach the market with no automated check
        stopping it?
    misgrading_notes: >-
      Post-trade surveillance is not a pre-trade control — catching a breach after execution does
      not lift this above Basic.

  - subcomponent_key: OEMS_PRE_TRADE_RISK
    level: Developing
    status: authored
    statement: >-
      Some pre-trade checks exist (basic limit or buying-power checks) but coverage is incomplete
      or inconsistent across order paths and can be bypassed. Restricted lists are updated manually
      and alerts are noisy or ignored.
    required_evidence:
      - Configuration of the checks that exist
      - Evidence of gaps or bypassable order paths
      - A manual restricted-list process
    differentiator_questions:
      - Are the checks applied consistently on every order-entry channel (UI, API, algo), or only
        the main one?
    misgrading_notes: >-
      A check demoed on the main UI may be absent on the API/FIX path — verify every order channel
      enforces it before crediting coverage.

  - subcomponent_key: OEMS_PRE_TRADE_RISK
    level: Advanced
    status: authored
    statement: >-
      Comprehensive automated pre-trade risk and compliance checks (credit/margin, position and
      exposure limits, fat-finger, restricted/watch lists, suitability) applied consistently on
      every order path, with configurable rules, hard blocks, and a full audit trail of checks and
      overrides.
    required_evidence:
      - Pre-trade rule configuration covering the full check set
      - Logs showing checks, blocks, and overrides on every order path
      - Audit trail of overrides with authorisation
    differentiator_questions:
      - Can an order that breaches a limit or hits a restricted name actually reach the market, or
        is it hard-blocked pre-trade on every path?
    misgrading_notes: >-
      "Warn-only" alerts that can be clicked through are not controls — distinguish soft warnings
      from hard blocks, and confirm the audit trail records overrides.

  - subcomponent_key: OEMS_PRE_TRADE_RISK
    level: Frontier
    status: authored
    statement: >-
      Pre-trade risk is a strength: real-time cross-asset/cross-account risk aggregation,
      low-latency checks that do not impede execution, scenario/what-if limits, and automated
      tuning, with overrides governed and analysed.
    required_evidence:
      - Real-time cross-account risk-aggregation architecture
      - Latency measurements for the check path
      - Governed override analytics and scenario/limit-tuning evidence
    differentiator_questions:
      - Is risk aggregated in real time across accounts and asset classes, or checked per order in
        isolation?
    misgrading_notes: >-
      Real-time cross-portfolio aggregation matters for multi-desk/prime brokers; a single-strategy
      platform rationally needs solid per-account checks, not firm-wide netting (§3.1).

  # --- EMS_GATEWAY ★ Risk & Throttling -----------------------------------------------------
  - subcomponent_key: EMS_GATEWAY_RISK_THROTTLING
    level: Basic
    status: authored
    statement: >-
      The gateway has no meaningful rate/throttling or risk controls. A runaway client or algo can
      flood a venue, message rates and order counts are unmonitored, and the kill-switch is manual
      or absent.
    required_evidence:
      - Inspection of gateway config for rate / risk controls (their absence)
      - Confirmation that there is no tested kill-switch
    differentiator_questions:
      - If a client or algo started flooding orders, is there anything at the gateway to stop it?
    misgrading_notes: >-
      A manual "pull the plug" is not a kill-switch control — absence of automated throttling or a
      tested cut-off is Basic.

  - subcomponent_key: EMS_GATEWAY_RISK_THROTTLING
    level: Developing
    status: authored
    statement: >-
      Basic throttling or message-rate caps exist but are coarse and static, and some gateway risk
      limits exist but are incomplete. A kill-switch exists but is untested, and controls are not
      tuned to venue limits.
    required_evidence:
      - Throttling / rate-cap configuration
      - Gateway risk-limit settings showing gaps
      - A kill-switch that lacks a test record
    differentiator_questions:
      - Are throttle limits actually aligned to the venue's thresholds, or set arbitrarily high?
    misgrading_notes: >-
      Throttle limits set far above any real venue limit are decorative — check they map to the
      venue's actual thresholds. An untested kill-switch caps this at Developing.

  - subcomponent_key: EMS_GATEWAY_RISK_THROTTLING
    level: Advanced
    status: authored
    statement: >-
      Configurable per-session/per-client throttling aligned to venue limits, gateway-level risk
      controls (max order rate, max order size/notional, duplicate/self-trade prevention), a tested
      kill-switch, and monitoring/alerting on throttle and risk events.
    required_evidence:
      - Per-session throttle configuration mapped to venue limits
      - Gateway risk-control settings (rate/size/notional, self-trade prevention)
      - A dated kill-switch test and throttle/risk event monitoring
    differentiator_questions:
      - If a client or algo goes rogue, does the gateway throttle or halt it automatically, and has
        the kill-switch been tested?
    misgrading_notes: >-
      A kill-switch that exists but has never been fired in a drill is Developing — require a dated
      test, not a described procedure.

  - subcomponent_key: EMS_GATEWAY_RISK_THROTTLING
    level: Frontier
    status: authored
    statement: >-
      Gateway risk is a strength: dynamic/adaptive throttling, real-time risk aggregation at the
      gateway, automated circuit-breakers, and fine-grained per-strategy controls with full
      telemetry.
    required_evidence:
      - Adaptive-throttling logic
      - Real-time gateway risk-aggregation dashboard
      - Automated circuit-breaker configuration with trigger logs and per-strategy telemetry
    differentiator_questions:
      - Is throttling adaptive to real-time conditions, or a fixed static cap?
    misgrading_notes: >-
      Adaptive gateway throttling matters for high-message-rate DMA/algo flow; a low-volume order
      gateway rationally needs static caps and a tested kill-switch — do not over-target (§3.1).

  # --- LIQ_CONNECT ★ Local Exchange Connectivity -------------------------------------------
  - subcomponent_key: LIQ_CONNECT_LOCAL_EXCHANGES
    level: Basic
    status: authored
    statement: >-
      Connectivity to local exchanges is via a single link or a manual/third-party workaround.
      Outages disconnect the firm, there is no redundancy, and connection health is unmonitored.
    required_evidence:
      - Inspection of the connectivity path (single link / third-party)
      - Confirmation that there is no redundancy or connection monitoring
    differentiator_questions:
      - Is there a second, independent path to the exchange, or does one line failing stop trading?
    misgrading_notes: >-
      Connectivity via a broker's infrastructure may be adequate but should not be graded as the
      firm's own direct connection — describe what the firm actually operates.

  - subcomponent_key: LIQ_CONNECT_LOCAL_EXCHANGES
    level: Developing
    status: authored
    statement: >-
      Direct connectivity exists to the main local exchange(s) but with limited redundancy.
      Failover is manual, monitoring is basic, adding a venue is a slow bespoke project, and
      occasional session drops disrupt trading.
    required_evidence:
      - Network / connectivity diagram to the local exchange(s)
      - Evidence of manual failover
      - Basic session-drop logs
    differentiator_questions:
      - If the primary line drops, does connectivity fail over automatically, or does someone
        reconnect manually?
    misgrading_notes: >-
      A single "direct" connection with no second path is not resilient — redundancy means an
      independent failover line, not a documented reconnect procedure.

  - subcomponent_key: LIQ_CONNECT_LOCAL_EXCHANGES
    level: Advanced
    status: authored
    statement: >-
      Resilient direct connectivity to relevant local exchanges with redundant links, automated
      session management and failover, monitored connection health with alerting, and a documented,
      repeatable venue-onboarding process.
    required_evidence:
      - Redundant-link topology
      - Automated session-management / failover configuration
      - Connection-health monitoring dashboard and a venue-onboarding runbook
    differentiator_questions:
      - Does connectivity fail over automatically without losing the session, and is health
        actively monitored?
    misgrading_notes: >-
      Failover must be automated and session-preserving — a redundant line that still requires a
      manual cutover is Developing.

  - subcomponent_key: LIQ_CONNECT_LOCAL_EXCHANGES
    level: Frontier
    status: authored
    statement: >-
      Exchange connectivity is a strength: fully redundant low-latency links (co-location/direct
      market access), automated failover with no session loss, proactive line monitoring, and rapid
      onboarding of new venues.
    required_evidence:
      - Co-location / DMA evidence
      - Latency-measured redundant paths and automated no-loss failover records
      - New-venue onboarding lead-time metrics
    differentiator_questions:
      - Is connectivity co-located/direct and latency-measured, or routed indirectly?
    misgrading_notes: >-
      Co-located DMA matters for latency-sensitive trading; a wealth platform routing via a broker
      rationally needs reliable, monitored connectivity, not co-location — do not over-target
      (§3.1).

  # --- LIQ_CONNECT ★ Settlement & Clearing Links -------------------------------------------
  - subcomponent_key: LIQ_CONNECT_SETTLEMENT_CLEARING
    level: Basic
    status: authored
    statement: >-
      Settlement and clearing instructions are sent manually (re-keyed, emailed, or via a portal)
      to CSDs/clearers. Fails are frequent and discovered late, there is no automated status
      tracking, and reconciliation is manual.
    required_evidence:
      - Inspection of how settlement instructions are sent (manual / portal)
      - Evidence of frequent, late-discovered settlement fails
    differentiator_questions:
      - Are settlement instructions sent straight-through, or re-keyed and chased manually?
    misgrading_notes: >-
      A portal that a human types into is still manual — the presence of an electronic channel does
      not make it straight-through processing.

  - subcomponent_key: LIQ_CONNECT_SETTLEMENT_CLEARING
    level: Developing
    status: authored
    statement: >-
      Links to the main clearers/CSDs exist with some automation (batch messaging) but manual
      intervention is common. Settlement status is tracked with effort, fails are managed
      reactively, and coverage of markets/instruments is limited.
    required_evidence:
      - Settlement-messaging configuration (batch)
      - The settlement-status tracking method
      - A fail-management process showing manual effort
    differentiator_questions:
      - Is settlement status matched automatically, or reconciled by hand each day?
    misgrading_notes: >-
      Batch messaging with manual repair is Developing, not STP — verify the exception rate and how
      fails are actually worked.

  - subcomponent_key: LIQ_CONNECT_SETTLEMENT_CLEARING
    level: Advanced
    status: authored
    statement: >-
      Automated settlement/clearing connectivity (e.g. SWIFT/CSD/CCP messaging) with straight-through
      instruction, automated status/matching, fail monitoring and management against SLAs, and
      reconciliation with audit trails across covered markets.
    required_evidence:
      - STP settlement/clearing connectivity configuration (SWIFT/CSD/CCP)
      - Automated matching/status and a fail-monitoring dashboard against SLAs
      - Reconciliation and audit trail plus the covered-market list
    differentiator_questions:
      - Are instructions straight-through with automated status matching across every market the
        firm trades?
    misgrading_notes: >-
      A link to one CSD does not mean coverage — check every market the firm trades settles
      automatically, not just the home market.

  - subcomponent_key: LIQ_CONNECT_SETTLEMENT_CLEARING
    level: Frontier
    status: authored
    statement: >-
      Settlement and clearing is a strength: real-time settlement status, predictive fail
      prevention, broad multi-market CSD/CCP coverage with automated exception handling, and
      readiness for accelerated (T+1/T+0) cycles.
    required_evidence:
      - Real-time settlement-status architecture
      - Predictive fail-prevention metrics
      - Multi-market CSD/CCP coverage with automated exception handling and a T+1/T+0 readiness
        assessment
    differentiator_questions:
      - Is settlement status available in real time with predictive fail prevention, and is the
        operation ready for a T+1/T+0 cycle?
    misgrading_notes: >-
      Multi-market STP and T+1 readiness matter for cross-border/scaled operations; a single-market
      firm rationally targets automated links to its home CSD/CCP — do not over-target (§3.1).

