status: draft-pending-ratification

# --- Authored anchors (Methodology §4 worked example: OEMS Smart Order Routing) -----------
anchors:
  - subcomponent_key: OEMS_EXEC_ALGOS
    level: Basic
    status: authored
    statement: >-
      Orders route to a single default venue, or a human chooses the venue per order. There is no
      automated multi-venue routing.
    required_evidence:
      - Order-flow / routing configuration
      - Venue fill reports
    differentiator_questions:
      - Can any order reach more than one venue without a human deciding?
    misgrading_notes: >-
      A manual venue picker is Basic even if several venues are technically reachable — reachability
      is not routing.

  - subcomponent_key: OEMS_EXEC_ALGOS
    level: Developing
    status: authored
    statement: >-
      Static rule-based routing (e.g. by instrument or size). Routing rules change by software
      release, not adapted from live execution data.
    required_evidence:
      - Routing rule set
      - Rule change log
    differentiator_questions:
      - Are routing rules changed by release, or adapted from live execution data?
    misgrading_notes: >-
      Vendors often demo dynamic routing that is disabled in production — verify the production
      config (E3+), not the sales environment.

  - subcomponent_key: OEMS_EXEC_ALGOS
    level: Advanced
    status: authored
    statement: >-
      Data-driven routing with venue cost/fill models, monitored fill-quality KPIs, and at least
      quarterly recalibration.
    required_evidence:
      - Smart-order-routing model documentation
      - Fill-quality dashboard
      - Recalibration records
    differentiator_questions:
      - Is routing driven by a cost/fill model whose parameters are recalibrated on a schedule?
    misgrading_notes: >-
      Recalibration must be evidenced by records, not asserted; a stale model that is "data-driven"
      in principle is still Developing.

  - subcomponent_key: OEMS_EXEC_ALGOS
    level: Frontier
    status: authored
    statement: >-
      Adaptive routing with real-time venue analytics and a measurable execution-quality advantage
      versus benchmark.
    required_evidence:
      - Real-time venue analytics
      - Execution-quality benchmark comparison
    differentiator_questions:
      - Is there a measured execution-quality advantage versus a benchmark, not just adaptivity?
    misgrading_notes: >-
      Frontier is rational for flow-heavy multi-venue brokers; it is NOT economically rational for a
      single-market wealth platform — do not treat it as the target there (§3.1).

