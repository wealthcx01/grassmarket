# The business-metric register (the B index, Methodology §5.3).
#
# STATUS: draft-pending-ratification (GRS-0002, revised GRS-0003). Each metric declares a unit, a
# direction, a piecewise-linear normalisation n_k mapping raw → [0,1], and a GROUP. B is a
# GROUP-WEIGHTED mean (ADR-0006): the within-group mean of each group, then a weighted mean across
# groups — so the collinear scale metrics (AUA ≈ clients ≈ revenue) count once as a group rather
# than ~4× of 10 (review B1). Group weights are uniform draft (1/3 each) pending elicitation.
#
# Groups: scale | unit_economics | momentum. ANCHOR VALUES are documented placeholders for a
# mid-tier retail brokerage pending Stage-1 judgement (percentile-vs-benchmark from Stage 2, §11).
# Anchors ascend by raw; direction records intent. A DRAFT for John — see GRS-0003 ticket.

status: draft-pending-ratification

# Group MEMBERSHIP (below, per metric) is registry structure. Group WEIGHTS are draft coefficients
# and live with the other coefficients (uniform 1/3 each pending elicitation) — not in the registry.

metrics:
  - key: AUA
    name: Assets Under Administration
    description: >-
      Total client assets the platform administers — its headline scale. Central for a wealth
      manager or custodian; for an execution-only broker, trade volume matters more.
    unit: GBP
    direction: higher_is_better
    group: scale
    status: draft-pending-ratification
    normalisation:
      method: piecewise_linear
      note: Placeholder anchors for a mid-tier retail brokerage; pending Stage-1 judgement.
      anchors:
        - {raw: 0, normalised: 0.2}
        - {raw: 250000000, normalised: 0.5}
        - {raw: 2000000000, normalised: 0.8}
        - {raw: 20000000000, normalised: 1.0}

  - key: ACTIVE_CLIENTS
    name: Active Clients
    description: >-
      Clients who actually transact, not just registrations — the real demand base. A retail
      broker lives on active-trader count; an advice-led wealth manager values fewer, larger
      relationships.
    unit: count
    direction: higher_is_better
    group: scale
    status: draft-pending-ratification
    normalisation:
      method: piecewise_linear
      note: Placeholder anchors; pending Stage-1 judgement.
      anchors:
        - {raw: 0, normalised: 0.2}
        - {raw: 25000, normalised: 0.5}
        - {raw: 250000, normalised: 0.8}
        - {raw: 2000000, normalised: 1.0}

  - key: NET_REVENUE
    name: Net Revenue (TTM)
    description: >-
      Trailing-twelve-month revenue after rebates and introducer fees — the top line the business
      actually keeps.
    unit: GBP
    direction: higher_is_better
    group: scale
    status: draft-pending-ratification
    normalisation:
      method: piecewise_linear
      note: Placeholder anchors; pending Stage-1 judgement.
      anchors:
        - {raw: 0, normalised: 0.2}
        - {raw: 10000000, normalised: 0.5}
        - {raw: 100000000, normalised: 0.8}
        - {raw: 1000000000, normalised: 1.0}

  - key: REVENUE_PER_CLIENT
    name: Revenue per Active Client (ARPU)
    description: >-
      Average revenue per active client — how much each relationship is worth. Low-and-wide for a
      neobroker; high-and-narrow for a private-wealth firm.
    unit: GBP_per_year
    direction: higher_is_better
    group: unit_economics
    status: draft-pending-ratification
    normalisation:
      method: piecewise_linear
      note: Placeholder anchors; pending Stage-1 judgement.
      anchors:
        - {raw: 50, normalised: 0.2}
        - {raw: 200, normalised: 0.5}
        - {raw: 600, normalised: 0.8}
        - {raw: 2000, normalised: 1.0}

  - key: GROSS_MARGIN
    name: Gross Margin
    description: >-
      Revenue left after the direct cost of serving it (clearing, market data, execution) — unit
      profitability before overheads.
    unit: percent
    direction: higher_is_better
    group: unit_economics
    status: draft-pending-ratification
    normalisation:
      method: piecewise_linear
      note: Placeholder anchors; pending Stage-1 judgement.
      anchors:
        - {raw: 20, normalised: 0.2}
        - {raw: 45, normalised: 0.5}
        - {raw: 65, normalised: 0.8}
        - {raw: 80, normalised: 1.0}

  - key: COST_TO_SERVE
    name: Cost to Serve per Client
    description: >-
      The direct cost to serve one client — the denominator of efficiency. Automation-heavy models
      drive this down; advice-led models accept it higher for higher ARPU.
    unit: GBP_per_year
    direction: lower_is_better
    group: unit_economics
    status: draft-pending-ratification
    normalisation:
      method: piecewise_linear
      note: Placeholder anchors (lower is better; normalised descends with raw).
      anchors:
        - {raw: 40, normalised: 1.0}
        - {raw: 100, normalised: 0.8}
        - {raw: 200, normalised: 0.5}
        - {raw: 400, normalised: 0.2}

  - key: TAKE_RATE_LEVEL
    name: Take Rate (level)
    description: >-
      The share of client flow or assets captured as revenue — pricing power. A few basis points
      for an exchange; far higher for a bundled wealth proposition.
    unit: bps
    direction: higher_is_better
    group: unit_economics
    status: draft-pending-ratification
    normalisation:
      method: piecewise_linear
      note: >-
        Renamed from TAKE_RATE_DURABILITY (review B3): this measures take-rate LEVEL, not
        durability. NB a high take rate can signal fee-compression RISK — the panel should decide
        whether to keep level here or replace with a durability measure (3-yr take-rate trend, or
        % of revenue from at-risk lines).
      anchors:
        - {raw: 5, normalised: 0.2}
        - {raw: 15, normalised: 0.5}
        - {raw: 30, normalised: 0.8}
        - {raw: 60, normalised: 1.0}

  - key: NET_REVENUE_RETENTION
    name: Net Revenue Retention
    description: >-
      Revenue kept and grown from the existing book over a year, net of churn and contraction —
      the compounding engine. Above 100% means the base grows without new logos.
    unit: percent
    direction: higher_is_better
    group: momentum
    status: draft-pending-ratification
    normalisation:
      method: piecewise_linear
      note: Placeholder anchors; pending Stage-1 judgement.
      anchors:
        - {raw: 80, normalised: 0.2}
        - {raw: 100, normalised: 0.5}
        - {raw: 110, normalised: 0.8}
        - {raw: 130, normalised: 1.0}

  - key: CLIENT_GROWTH_RATE
    name: YoY Active-Client Growth
    description: >-
      Year-on-year growth in active clients — top-of-funnel momentum. The headline for a scaling
      neobroker; a mature private bank optimises depth over count.
    unit: percent
    direction: higher_is_better
    group: momentum
    status: draft-pending-ratification
    normalisation:
      method: piecewise_linear
      note: Placeholder anchors; pending Stage-1 judgement.
      anchors:
        - {raw: 0, normalised: 0.2}
        - {raw: 10, normalised: 0.5}
        - {raw: 25, normalised: 0.8}
        - {raw: 50, normalised: 1.0}

  - key: CAC_PAYBACK_MONTHS
    name: CAC Payback Period
    description: >-
      Months of gross margin to recover the cost of acquiring a client — how quickly growth pays
      for itself. Lower is better; long paybacks make aggressive acquisition fragile.
    unit: months
    direction: lower_is_better
    group: momentum
    status: draft-pending-ratification
    normalisation:
      method: piecewise_linear
      note: Placeholder anchors (lower is better; normalised descends with raw).
      anchors:
        - {raw: 6, normalised: 1.0}
        - {raw: 12, normalised: 0.8}
        - {raw: 24, normalised: 0.5}
        - {raw: 48, normalised: 0.2}
