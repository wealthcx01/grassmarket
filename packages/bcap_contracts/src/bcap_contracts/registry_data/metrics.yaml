# The business-metric register (the B index, Methodology §5.3).
#
# STATUS: draft-pending-ratification (GRS-0002). Each metric declares a unit (captured, never
# inferred — retiring defect D5's unit-sensitive heuristic), a direction, and a piecewise-linear
# normalisation n_k mapping raw → [0,1]. The ANCHOR VALUES here are DOCUMENTED PLACEHOLDERS for a
# mid-tier retail brokerage, pending Stage-1 expert judgement; from Stage 2 (≥10 engagements) the
# method becomes percentile-vs-benchmark-population (§11). Anchors are ordered by ascending raw;
# `direction` records intent (normalised ascends for higher_is_better, descends for lower).
# This register is a DRAFT for John's ratification — see docs/tickets/GRS-0002-registry-content.md.

status: draft-pending-ratification

metrics:
  - key: AUA
    name: Assets Under Administration
    unit: GBP
    direction: higher_is_better
    status: draft-pending-ratification
    normalisation:
      method: piecewise_linear
      note: Placeholder anchors for a mid-tier retail brokerage; pending Stage-1 judgement.
      anchors:
        - {raw: 0, normalised: 0.2}
        - {raw: 250000000, normalised: 0.5}
        - {raw: 2000000000, normalised: 0.8}
        - {raw: 20000000000, normalised: 1.0}

